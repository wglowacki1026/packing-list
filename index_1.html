<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vegas Packing" />
  <title>Las Vegas Packing List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #f0e6c8;
      padding-bottom: 60px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #020818 0%, #0a1a3a 50%, #050d24 100%);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 48px 24px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-sub {
      font-size: 12px;
      letter-spacing: 0.25em;
      color: #c9a84c;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .header h1 {
      font-size: clamp(26px, 6vw, 40px);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #f0e6c8;
      margin-bottom: 6px;
    }
    .header-tag {
      font-size: 11px;
      color: rgba(201,168,76,0.6);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Progress */
    .progress-wrap {
      max-width: 320px;
      margin: 28px auto 0;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(201,168,76,0.7);
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #c9a84c, #f0d080);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* Content */
    .content {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Section */
    .section { margin-top: 28px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(201,168,76,0.13);
    }
    .section-emoji { font-size: 18px; }
    .section-title {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.6);
      transition: color 0.3s;
    }
    .section-title.done { color: #c9a84c; }
    .section-count {
      margin-left: auto;
      font-size: 11px;
      color: rgba(201,168,76,0.33);
      letter-spacing: 0.05em;
    }

    /* Item */
    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      margin-bottom: 4px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.2s, border-color 0.2s;
      user-select: none;
    }
    .item:active { opacity: 0.75; }
    .item.checked {
      background: rgba(201,168,76,0.05);
      border-color: rgba(201,168,76,0.13);
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .item.checked .checkbox {
      background: #c9a84c;
      border-color: #c9a84c;
    }
    .checkmark {
      display: none;
      width: 10px;
      height: 8px;
    }
    .item.checked .checkmark { display: block; }

    .item-label {
      font-size: 14px;
      color: rgba(240,230,200,0.8);
      line-height: 1.4;
      transition: color 0.2s, text-decoration 0.2s;
    }
    .item.checked .item-label {
      color: rgba(201,168,76,0.5);
      text-decoration: line-through;
      text-decoration-color: rgba(201,168,76,0.35);
    }

    /* Tip */
    .tip {
      margin-top: 36px;
      padding: 16px 20px;
      border-radius: 8px;
      background: rgba(201,168,76,0.04);
      border: 1px solid rgba(201,168,76,0.13);
    }
    .tip-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 6px;
    }
    .tip-text {
      font-size: 13px;
      color: rgba(240,230,200,0.65);
      line-height: 1.6;
    }

    /* Reset */
    .reset-wrap { text-align: center; margin-top: 32px; }
    .reset-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.27);
      padding: 9px 22px;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, color 0.2s;
    }
    .reset-btn:active { opacity: 0.6; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-sub">Las Vegas · 4 Days</div>
    <h1>Packing List</h1>
    <div class="header-tag">Diabetic Travel Edition</div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="prog-text">0 of 33 packed</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="prog-bar"></div>
      </div>
    </div>
  </div>

  <div class="content" id="list-content"></div>

  <script>
    const sections = [
      { title: "Diabetes Supplies", emoji: "💉", items: [
        "Insulin + backup supply",
        "Insulin pens or syringes",
        "Insulin pump supplies (tubing, reservoirs, sites)",
        "Blood glucose meter + lancets + test strips",
        "CGM supplies (sensors, transmitter)",
        "Glucagon emergency kit or nasal glucagon",
        "Fast-acting glucose tabs or gummies",
        "Ketone test strips",
        "Sharps disposal container (travel size)",
        "Insulin cooling case",
        "Doctor's letter explaining supplies",
      ]},
      { title: "Medications", emoji: "💊", items: [
        "All daily medications + extra days supply",
        "Pain reliever, antacids, antihistamine",
      ]},
      { title: "Clothing", emoji: "👕", items: [
        "4-5 outfits + one extra",
        "Comfortable broken-in walking shoes",
        "Sandals or casual shoes",
        "Light jacket or hoodie (casinos are cold)",
        "Socks, underwear, pajamas",
      ]},
      { title: "Toiletries", emoji: "🧴", items: [
        "Sunscreen",
        "Lip balm",
        "Deodorant, shampoo, toothbrush/paste, razors",
        "Blister pads or moleskin",
      ]},
      { title: "Electronics", emoji: "🔌", items: [
        "Phone + charger",
        "Portable battery pack",
        "Earbuds",
      ]},
      { title: "Documents & Wallet", emoji: "📄", items: [
        "ID or passport",
        "Insurance cards",
        "Hotel confirmation",
        "Cash + cards",
        "TSA note for medical devices",
      ]},
      { title: "Food & Snacks", emoji: "🥜", items: [
        "Protein bars or nuts",
        "Late-night snacks for blood sugar",
        "Meal-replacement options",
      ]},
    ];

    const totalItems = sections.reduce((a, s) => a + s.items.length, 0);
    const state = {};

    function getKey(sTitle, item) { return `${sTitle}::${item}`; }

    function updateProgress() {
      const checked = Object.values(state).filter(Boolean).length;
      const pct = Math.round((checked / totalItems) * 100);
      document.getElementById('prog-text').textContent = `${checked} of ${totalItems} packed`;
      document.getElementById('prog-pct').textContent = `${pct}%`;
      document.getElementById('prog-bar').style.width = `${pct}%`;
      document.getElementById('reset-wrap').classList.toggle('hidden', checked === 0);
    }

    function updateSection(sTitle, items) {
      const checked = items.filter(i => state[getKey(sTitle, i)]).length;
      const titleEl = document.getElementById(`title-${sTitle}`);
      const countEl = document.getElementById(`count-${sTitle}`);
      if (titleEl) titleEl.classList.toggle('done', checked === items.length);
      if (countEl) countEl.textContent = `${checked}/${items.length}`;
    }

    function toggleItem(key, sTitle, items, el) {
      state[key] = !state[key];
      el.classList.toggle('checked', state[key]);
      updateSection(sTitle, items);
      updateProgress();
    }

    // Build DOM
    const content = document.getElementById('list-content');

    sections.forEach(({ title, emoji, items }) => {
      const section = document.createElement('div');
      section.className = 'section';

      section.innerHTML = `
        <div class="section-header">
          <span class="section-emoji">${emoji}</span>
          <span class="section-title" id="title-${title}">${title}</span>
          <span class="section-count" id="count-${title}">0/${items.length}</span>
        </div>
      `;

      items.forEach(item => {
        const key = getKey(title, item);
        state[key] = false;

        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = `
          <div class="checkbox">
            <svg class="checkmark" viewBox="0 0 10 8" fill="none">
              <path d="M1 4L3.5 6.5L9 1" stroke="#0a0a0f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="item-label">${item}</span>
        `;
        el.addEventListener('click', () => toggleItem(key, title, items, el));
        section.appendChild(el);
      });

      content.appendChild(section);
    });

    // Tip
    content.innerHTML += `
      <div class="tip" style="margin-top:36px">
        <div class="tip-label">Pro Tip</div>
        <div class="tip-text">Split your supplies — half in carry-on, half in your bag. Losing everything to a lost bag in Vegas is a bad time.</div>
      </div>
      <div class="reset-wrap hidden" id="reset-wrap">
        <button class="reset-btn" onclick="resetAll()">Reset All</button>
      </div>
    `;

    function resetAll() {
      Object.keys(state).forEach(k => state[k] = false);
      document.querySelectorAll('.item').forEach(el => el.classList.remove('checked'));
      sections.forEach(({ title, items }) => updateSection(title, items));
      updateProgress();
    }

    updateProgress();
  </script>
</body>
</html>
