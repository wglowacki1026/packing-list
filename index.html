<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vegas Packing" />
  <title>Las Vegas Packing List</title>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.1/lib/msal-browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #f0e6c8;
      padding-bottom: 60px;
    }

    /* Auth screen */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .auth-title {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 12px;
    }
    .auth-heading {
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 400;
      color: #f0e6c8;
      margin-bottom: 8px;
    }
    .auth-sub {
      font-size: 13px;
      color: rgba(240,230,200,0.45);
      margin-bottom: 40px;
      letter-spacing: 0.05em;
    }
    .sign-in-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0078d4;
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
    }
    .sign-in-btn:hover { background: #106ebe; }
    .sign-in-btn:active { background: #005a9e; }
    .sign-in-btn svg { flex-shrink: 0; }
    .auth-error {
      margin-top: 20px;
      font-size: 12px;
      color: #ff6b6b;
      display: none;
    }

    /* User bar */
    #user-bar {
      display: none;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 12px;
      color: rgba(240,230,200,0.45);
    }
    #user-name { color: rgba(201,168,76,0.8); }
    .sign-out-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.3);
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
    }

    /* Main app - hidden until authed */
    #app { display: none; }

    /* Header */
    .header {
      background: linear-gradient(135deg, #020818 0%, #0a1a3a 50%, #050d24 100%);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 48px 24px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-sub {
      font-size: 12px;
      letter-spacing: 0.25em;
      color: #c9a84c;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .header h1 {
      font-size: clamp(26px, 6vw, 40px);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #f0e6c8;
      margin-bottom: 6px;
    }
    .header-tag {
      font-size: 11px;
      color: rgba(201,168,76,0.6);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Progress */
    .progress-wrap { max-width: 320px; margin: 28px auto 0; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(201,168,76,0.7);
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #c9a84c, #f0d080);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* Content */
    .content { max-width: 560px; margin: 0 auto; padding: 0 16px; }

    /* Section */
    .section { margin-top: 28px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(201,168,76,0.13);
    }
    .section-emoji { font-size: 18px; }
    .section-title {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.6);
      transition: color 0.3s;
    }
    .section-title.done { color: #c9a84c; }
    .section-count {
      margin-left: auto;
      font-size: 11px;
      color: rgba(201,168,76,0.33);
      letter-spacing: 0.05em;
    }

    /* Item */
    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      margin-bottom: 4px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.2s, border-color 0.2s;
      user-select: none;
    }
    .item:active { opacity: 0.75; }
    .item.checked {
      background: rgba(201,168,76,0.05);
      border-color: rgba(201,168,76,0.13);
    }
    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .item.checked .checkbox { background: #c9a84c; border-color: #c9a84c; }
    .checkmark { display: none; width: 10px; height: 8px; }
    .item.checked .checkmark { display: block; }
    .item-label {
      font-size: 14px;
      color: rgba(240,230,200,0.8);
      line-height: 1.4;
      transition: color 0.2s;
    }
    .item.checked .item-label {
      color: rgba(201,168,76,0.5);
      text-decoration: line-through;
      text-decoration-color: rgba(201,168,76,0.35);
    }

    /* Tip */
    .tip {
      margin-top: 36px;
      padding: 16px 20px;
      border-radius: 8px;
      background: rgba(201,168,76,0.04);
      border: 1px solid rgba(201,168,76,0.13);
    }
    .tip-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 6px;
    }
    .tip-text { font-size: 13px; color: rgba(240,230,200,0.65); line-height: 1.6; }

    /* Reset */
    .reset-wrap { text-align: center; margin-top: 32px; }
    .reset-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.27);
      padding: 9px 22px;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
    }
    .reset-btn:active { opacity: 0.6; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- Auth screen -->
  <div id="auth-screen">
    <div class="auth-title">Las Vegas · 4 Days</div>
    <div class="auth-heading">Packing List</div>
    <div class="auth-sub">Diabetic Travel Edition</div>
    <button class="sign-in-btn" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </button>
    <div class="auth-error" id="auth-error">Sign-in failed. Please try again.</div>
  </div>

  <!-- Authenticated app -->
  <div id="app">
    <div id="user-bar">
      <span>Signed in as <span id="user-name"></span></span>
      <button class="sign-out-btn" onclick="signOut()">Sign out</button>
    </div>

    <div class="header">
      <div class="header-sub">Las Vegas · 4 Days</div>
      <h1>Packing List</h1>
      <div class="header-tag">Diabetic Travel Edition</div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="prog-text">0 of 33 packed</span>
          <span id="prog-pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="prog-bar"></div>
        </div>
      </div>
    </div>

    <div class="content" id="list-content"></div>
  </div>

  <script>
    // MSAL config
    const msalConfig = {
      auth: {
        clientId: "62ff6f77-96f7-45f3-a338-1fad365ddd95",
        authority: "https://login.microsoftonline.com/14b646f9-a0cf-44a6-8ac1-6d25082a04c5",
        redirectUri: window.location.origin + window.location.pathname,
      },
      cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: true }
    };

    let msalInstance = null;

    async function getMsal() {
      if (!msalInstance) {
        msalInstance = new msal.PublicClientApplication(msalConfig);
        await msalInstance.initialize();
      }
      return msalInstance;
    }

    async function initAuth() {
      const msalInstance = await getMsal();
      try {
        const response = await msalInstance.handleRedirectPromise();
        if (response) {
          showApp(response.account);
          return;
        }
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          showApp(accounts[0]);
        }
        // else: stay on auth screen
      } catch (e) {
        console.error(e);
      }
    }

    async function signIn() {
      const msalInstance = await getMsal();
      msalInstance.loginRedirect({ scopes: ["User.Read"] });
    }

    async function signOut() {
      const msalInstance = await getMsal();
      msalInstance.logoutRedirect();
    }

    function showApp(account) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('user-bar').style.display = 'flex';
      document.getElementById('user-name').textContent = account.name || account.username;
      buildList();
    }

    // Packing list data
    const sections = [
      { title: "Tandem Mobi Pump", emoji: "💉", items: [
        "Tandem Mobi pump (charged before leaving)",
        "Wireless charger + charging cable",
        "Extra insulin cartridges (1 per 3 days + 2 backup = 4 total)",
        "Infusion sets (1 per 3 days + 2 backup = 4 total)",
        "Adhesive sleeves (on-body wear option)",
        "AutoSoft XC or preferred infusion set with 5-inch tubing",
        "Cartridge fill syringes",
        "Skin-prep wipes / IV prep wipes",
        "Extra adhesive patches or overtape",
        "Pump clip or spare adhesive sleeve",
        "Tandem mobile app installed and paired on iPhone",
        "Control-IQ active and settings confirmed before trip",
        "Tandem Travel Loaner Program contact saved (1-877-801-6901)",
        "Printed 'Flying with Your Tandem Insulin Pump' handout for TSA",
      ]},
      { title: "CGM (Dexcom G6/G7)", emoji: "📡", items: [
        "Dexcom sensors (2 — one active, one backup)",
        "Dexcom transmitter (confirm battery life before leaving)",
        "Dexcom receiver or iPhone app confirmed working",
        "Extra sensor overtape / adhesive patches",
        "Alcohol wipes for sensor site prep",
        "Sensor paired to Tandem Mobi before boarding",
      ]},
      { title: "Insulin & BG Backup", emoji: "🩸", items: [
        "Insulin vials (NovoLog or Humalog U-100) — extra supply",
        "Backup insulin pens + pen needles",
        "Blood glucose meter + lancets + test strips",
        "Fast-acting glucose tabs or gummies (lows happen)",
      ]},
      { title: "Medications", emoji: "💊", items: [
        "All daily medications + 2 extra days supply",
        "Pain reliever, antacids, antihistamine",
      ]},
      { title: "Day 1 Clothing", emoji: "👕", items: [
        "Outfit (shirt, pants/shorts)",
        "Underwear",
        "Socks",
        "Comfortable walking shoes",
      ]},
      { title: "Day 2 Clothing", emoji: "👕", items: [
        "Outfit (shirt, pants/shorts)",
        "Underwear",
        "Socks",
      ]},
      { title: "Day 3 Clothing", emoji: "👕", items: [
        "Outfit (shirt, pants/shorts)",
        "Underwear",
        "Socks",
      ]},
      { title: "Day 4 Clothing", emoji: "👕", items: [
        "Outfit (shirt, pants/shorts)",
        "Underwear",
        "Socks",
      ]},
      { title: "Extra Clothing", emoji: "🧳", items: [
        "1 spare outfit (spills happen)",
        "Light jacket or hoodie (casinos are freezing)",
        "Sandals or casual shoes",
        "Pajamas",
        "Swimsuit (if needed)",
      ]},
      { title: "Toiletries", emoji: "🧴", items: [
        "Sunscreen (you will be outside more than you think)",
        "Lip balm",
        "Deodorant, shampoo, toothbrush, toothpaste, razors",
        "Blister pads or moleskin",
        "Body wipes / cleansing wipes",
      ]},
      { title: "Electronics", emoji: "🔌", items: [
        "iPhone (Tandem Mobi controller) + charger",
        "Tandem Mobi wireless charger",
        "Portable battery pack (for pump charging on the go)",
        "Earbuds",
      ]},
      { title: "Documents & Wallet", emoji: "📄", items: [
        "ID or passport",
        "Insurance cards",
        "Hotel confirmation",
        "Cash + cards",
        "TSA medical device notification card",
      ]},
      { title: "Food & Snacks", emoji: "🥜", items: [
        "Protein bars or nuts (blood sugar stability on the Strip)",
        "Fast-acting carbs for lows (glucose tabs, juice boxes)",
        "Late-night snacks (buffets and late meals wreck BG)",
        "Meal-replacement options",
      ]},
    ];

    const totalItems = sections.reduce((a, s) => a + s.items.length, 0);
    const state = {};

    function getKey(sTitle, item) { return `${sTitle}::${item}`; }

    function updateProgress() {
      const checked = Object.values(state).filter(Boolean).length;
      const pct = Math.round((checked / totalItems) * 100);
      document.getElementById('prog-text').textContent = `${checked} of ${totalItems} packed`;
      document.getElementById('prog-pct').textContent = `${pct}%`;
      document.getElementById('prog-bar').style.width = `${pct}%`;
      const rw = document.getElementById('reset-wrap');
      if (rw) rw.classList.toggle('hidden', checked === 0);
    }

    function updateSection(sTitle, items) {
      const checked = items.filter(i => state[getKey(sTitle, i)]).length;
      const titleEl = document.getElementById(`title-${sTitle}`);
      const countEl = document.getElementById(`count-${sTitle}`);
      if (titleEl) titleEl.classList.toggle('done', checked === items.length);
      if (countEl) countEl.textContent = `${checked}/${items.length}`;
    }

    function toggleItem(key, sTitle, items, el) {
      state[key] = !state[key];
      el.classList.toggle('checked', state[key]);
      updateSection(sTitle, items);
      updateProgress();
    }

    function buildList() {
      const content = document.getElementById('list-content');
      sections.forEach(({ title, emoji, items }) => {
        const section = document.createElement('div');
        section.className = 'section';
        section.innerHTML = `
          <div class="section-header">
            <span class="section-emoji">${emoji}</span>
            <span class="section-title" id="title-${title}">${title}</span>
            <span class="section-count" id="count-${title}">0/${items.length}</span>
          </div>`;
        items.forEach(item => {
          const key = getKey(title, item);
          state[key] = false;
          const el = document.createElement('div');
          el.className = 'item';
          el.innerHTML = `
            <div class="checkbox">
              <svg class="checkmark" viewBox="0 0 10 8" fill="none">
                <path d="M1 4L3.5 6.5L9 1" stroke="#0a0a0f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="item-label">${item}</span>`;
          el.addEventListener('click', () => toggleItem(key, title, items, el));
          section.appendChild(el);
        });
        content.appendChild(section);
      });

      const footer = document.createElement('div');
      footer.innerHTML = `
        <div class="tip" style="margin-top:36px">
          <div class="tip-label">Pro Tip</div>
          <div class="tip-text">Split your supplies — half in carry-on, half in your bag. Losing everything to a lost bag in Vegas is a bad time.</div>
        </div>
        <div class="reset-wrap hidden" id="reset-wrap">
          <button class="reset-btn" onclick="resetAll()">Reset All</button>
        </div>`;
      content.appendChild(footer);
      updateProgress();
    }

    function resetAll() {
      Object.keys(state).forEach(k => state[k] = false);
      document.querySelectorAll('.item').forEach(el => el.classList.remove('checked'));
      sections.forEach(({ title, items }) => updateSection(title, items));
      updateProgress();
    }

    initAuth();
  </script>
</body>
</html>
